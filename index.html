<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Tube</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        .active {
            background-color: red;
            color: white;
        }
    </style>

</head>

<body class="md:container container md:mx-auto mx-auto">

    <header class="mt-5">
        <nav>
            <div class="navbar bg-base-100 border-b border-[#25252520]">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>

                    </div>
                    <a class="btn btn-ghost text-3xl font-bold"> <img src="asset/Logo.png" alt=""></a>
                </div>
                <div class="navbar-center hidden lg:flex">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="searchInput" type="search" required placeholder="Search" />
                    </label>
                </div>
                <div class="navbar-end">
                    <a class="btn bg-[#FF1F3D] text-white">Sort by View</a>
                </div>
            </div>
        </nav>

        <!-- all comedy action etc navber -->

        <nav id="btn-container" class="md:flex md:justify-center my-5 justify-center gap-x-3">

            <div>
                <button id="allVideo" onclick="loadVideos()"
                    class="btn btn-sm font-semibold text-lg hover:bg-[#FF1F3D] text-[#17171770]">All</button>
            </div>

        </nav>
    </header>

    <!-- here for videos categories start  -->

    <!--  " -->
    <section class="grid md:grid-cols-4 gap-4 " id="videosContainer">


    </section>

    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <dialog id="videoDetails" class="modal">
        <div class="modal-box">

            <div id="detailsContainer">

            </div>

            <div class="modal-action">
                <form method="dialog">

                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    <script src="script/index.js"></script>

</body>


</html>
