<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH Tube</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   
   <style>
        .active{
            background-color: red;
            color: white;
        }
    </style>

</head>

<body class="md:container container md:mx-auto mx-auto">

    <header class="mt-5">
        <nav>
            <div class="navbar bg-base-100 border-b border-[#25252520]">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>

                    </div>
                    <a class="btn btn-ghost text-3xl font-bold"> <img src="asset/Logo.png" alt=""></a>
                </div>
                <div class="navbar-center hidden lg:flex">
                    <button class="bg-[#25252520] py-2 px-4 rounded-md hover:cursor-pointer font-semibold ">Sort by View</button>
                </div>
                <div class="navbar-end">
                    <a class="btn bg-[#FF1F3D] text-white">Blogs</a>
                </div>
            </div>
        </nav>

        <!-- all comedy action etc navber -->

        <nav id="btn-container" class="md:flex md:justify-center my-5 justify-center gap-x-3">

            <div>
                <button id="allVideo" onclick="loadVideos()" class="btn btn-sm font-semibold text-lg hover:bg-[#FF1F3D] text-[#17171770]">All</button>
            </div>

        </nav>
    </header>

    <!-- here for videos categories start  -->

<!--  " -->
    <section class="grid md:grid-cols-4 gap-4 " id="videosContainer">

         
    </section>
   
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="videoDetails" class="modal">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Hello!</h3>
    <p class="py-4">Press ESC key or click the button below to close</p>
    <div class="modal-action">
      <form method="dialog">
       
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <script src="script/index.js"></script>
    
</body>


</html>
